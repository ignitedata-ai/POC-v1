server {
    listen 7867;
    server_name _;
    client_max_body_size 20m;  # Allow PDF uploads up to 20MB

    # Admin App (Template Repository) — /admin
    location /admin/api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/ {
        alias /app/client/dist/;
        try_files $uri $uri/ /admin/index.html;
    }

    location /admin {
        return 301 /admin/;
    }

    # User App (Plan of Correction) — / (default)
    location /api/ {
        proxy_pass http://127.0.0.1:3002/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /app/user-app/client/dist;
        try_files $uri $uri/ /index.html;
    }
}
